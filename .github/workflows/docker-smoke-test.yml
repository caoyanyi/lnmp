name: docker-smoke-test

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Docker info
        run: |
          docker version
          docker compose version

      - name: Run multi-distro smoke test
        run: |
          chmod +x test/run-docker-smoke.sh
          ./test/run-docker-smoke.sh
